<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ title }} - Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  {% include 'navbar.html' %}

  <main class="dashboard">
    <h1>Admin Panel</h1>
    <p>Welcome, {{ name }}. This area is restricted to administrators.</p>

    <div class="admin-actions" style="margin: 1rem 0 2rem;">
      <a href="{{ url_for('admin_user_management') }}" class="btn-secondary">Manage Users</a>
    </div>

    <form method="post" class="profile-card" style="margin: 2rem 0 0;">
      <h2>Security Settings</h2>
      <div class="form-group">
        <label>
          <input type="checkbox" name="registration_enabled" {% if registration_enabled %}checked{% endif %}>
          Allow new registrations
        </label>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="login_enabled" {% if login_enabled %}checked{% endif %}>
          Allow logins
        </label>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="maintenance_mode" {% if maintenance_enabled %}checked{% endif %}>
          Enable maintenance mode
        </label>
      </div>
      <button type="submit" class="btn-primary">Save Settings</button>
    </form>
  </main>

  {% include 'footer.html' %}
</body>
</html>
