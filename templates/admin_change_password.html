<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ title }} - Change Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  {% include 'navbar.html' %}

  <main class="dashboard">
    <h1>Change Password</h1>
    <p>Set a new password for <strong>{{ target_user.name }}</strong> (ID: {{ target_user.id }}).</p>

    <form method="post" class="profile-card" style="max-width: 480px;">
      <div class="form-group">
        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" required minlength="8" />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" required minlength="8" />
      </div>
      <button type="submit" class="btn-primary">Update Password</button>
      <a href="{{ url_for('admin_user_management') }}" class="btn-secondary">Back to User List</a>
    </form>
  </main>

  {% include 'footer.html' %}
</body>
</html>
