<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Acme</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <a href="/" class="auth-back">← Back to home</a>

  <div class="auth-container">
    <div class="auth-header">
      <div class="logo auth-logo">Acme<span>.</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login', this)">Sign in</button>
        <button class="auth-tab" onclick="showTab('register', this)">Register</button>
      </div>
    </div>

    <div id="login" class="auth-form active">
      <form action="/login" method="post">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="••••••••" required />
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
        <button type="submit" class="btn-primary full-width">Sign in</button>
      </form>
    </div>

    <div id="register" class="auth-form">
      <form action="/register" method="post">
        <div class="form-group">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" name="name" placeholder="Jane Smith" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" placeholder="Min. 8 characters" required />
        </div>
        <button type="submit" class="btn-primary full-width">Create account</button>
        <p class="auth-note">By creating an account, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
      </form>
    </div>
  </div>

  <script>
    function showTab(tab, btn) {
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
