<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Acme</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
 
  <nav class="navbar">
    <a href="/" class="logo">Acme<span>.</span></a>
    <div class="nav-links">
      <span class="nav-user">👋 {{ name }}</span>
      <a href="/logout" class="btn-login">Log out</a>
    </div>
  </nav>
 
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrapper page-flash">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
 
  <div class="dashboard">
    <h1>Welcome, <em>{{ name }}</em>.</h1>
    <p>You're logged in. This is your dashboard — build something great here.</p>
  </div>
 
</body>
</html>
