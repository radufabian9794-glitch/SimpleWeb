<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Acme</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>

<body>

  {% include 'navbar.html' %}

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrapper page-flash">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="profile-page">
    <main class="profile-card" role="main" aria-labelledby="profile-heading">
        <h1 id="profile-heading">Your profile</h1>

        <section aria-labelledby="account-info">
            <h2 id="account-info">Account</h2>
            <div class="profile-field">
                <label>Username</label>
                <input type="text" value="{{ name }}" class="profile-readonly" readonly aria-readonly="true">
            </div>
            <div class="profile-field">
                <label>Email</label>
                <input type="email" value="{{ email }}" class="profile-readonly" readonly aria-readonly="true">
            </div>
        </section>

        <hr class="profile-section-divider">

        <section aria-labelledby="password-section">
            <h2 id="password-section">Change password</h2>

            <form id="password-form" method="post" action="/profile/change-password">
                <div class="profile-field">
                    <label for="current_password">Current password</label>
                    <input id="current_password" name="current_password" type="password" required autocomplete="current-password">
                </div>
                <div class="profile-field">
                    <label for="new_password">New password</label>
                    <input id="new_password" name="new_password" type="password" required autocomplete="new-password" minlength="8">
                </div>
                <div class="profile-field">
                    <label for="confirm_password">Confirm new password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" minlength="8">
                </div>

                <button type="submit" class="btn-primary">Change password</button>
                <div id="msg" role="status" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <script>
        (function(){
            const form = document.getElementById('password-form');
            const newPwd = document.getElementById('new_password');
            const confirmPwd = document.getElementById('confirm_password');
            const msg = document.getElementById('msg');

            form.addEventListener('submit', function(e){
                msg.textContent = '';
                msg.className = '';

                if (newPwd.value !== confirmPwd.value) {
                    e.preventDefault();
                    msg.textContent = 'New password and confirmation do not match.';
                    msg.className = 'profile-error';
                    confirmPwd.focus();
                    return;
                }

                if (newPwd.value.length < 8) {
                    e.preventDefault();
                    msg.textContent = 'New password must be at least 8 characters.';
                    msg.className = 'profile-error';
                    newPwd.focus();
                    return;
                }
            });
        })();
    </script>
  </div>

 <footer class="footer">
    <span>© 2025 Acme Inc.</span>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </footer>
</body>
</html>
